name: CloseAll
options:
  bundleIdPrefix: com.closeall
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: CloseAll
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""
    ENABLE_DEBUG_DYLIB: "NO"
    ARCHS: "arm64"
    EXCLUDED_ARCHS: ""

targets:
  CloseAll:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleIconFile: AppIcon.icns
        PRODUCT_BUNDLE_IDENTIFIER: com.closeall.app2
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: ""
        REGISTER_WITH_LAUNCH_SERVICES: "NO"
    postBuildScripts:
      - name: "Copy to Applications"
        script: |
          if [ -d "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app" ]; then
            LSREGISTER="/System/Library/Frameworks/CoreServices.framework/Versions/Current/Frameworks/LaunchServices.framework/Versions/Current/Support/lsregister"

            "$LSREGISTER" -u /Applications/CloseAll.app 2>/dev/null || true
            rm -rf /Applications/CloseAll.app
            cp -R "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app" /Applications/
            codesign --force --deep --sign - /Applications/CloseAll.app
            "$LSREGISTER" -f -R -trusted /Applications/CloseAll.app

            echo "✓ Updated /Applications/CloseAll.app"
          fi
        runOnlyForDebugBuilds: true

schemes:
  CloseAll:
    build:
      targets:
        CloseAll: all
      postActions:
        - name: "Register with Launch Services"
          settingsTarget: CloseAll
          script: |
            LSREGISTER="/System/Library/Frameworks/CoreServices.framework/Versions/Current/Frameworks/LaunchServices.framework/Versions/Current/Support/lsregister"
            "$LSREGISTER" -f -R -trusted /Applications/CloseAll.app 2>/dev/null || true