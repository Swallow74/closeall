name: CloseAll
options:
  bundleIdPrefix: com.closeall
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: CloseAll
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""
    ARCHS: "arm64"
    EXCLUDED_ARCHS: ""

targets:
  CloseAll:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleIconFile: AppIcon.icns
        PRODUCT_BUNDLE_IDENTIFIER: com.closeall.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: ""
    postBuildScripts:
      - name: "Copy to Applications"
        script: |
          if [ -d "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app" ]; then
            rm -rf /Applications/CloseAll.app
            cp -R "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app" /Applications/
            echo "✓ Updated /Applications/CloseAll.app"
          fi
        runOnlyForDebugBuilds: true